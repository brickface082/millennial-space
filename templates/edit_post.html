<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post - Millennial Space</title>
    <style>
        body {
            background-color: #ff66b2;
            font-family: 'Comic Sans MS', cursive;
            margin: 0;
            padding: 20px;
        }
        .edit-box {
            background: rgba(255,255,255,0.9);
            max-width: 600px;
            margin: 0 auto;
            padding: 24px;
            border: 4px ridge #00ffff;
            box-shadow: 4px 4px 0px #ff00ff;
        }
        h1 {
            color: #ff1493;
            text-shadow: 2px 2px #ffff00;
            margin-top: 0;
        }
        textarea {
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 15px;
            border: 2px solid #ff66b2;
            padding: 8px;
            height: 120px;
            resize: vertical;
            margin-top: 8px;
        }
        .flash {
            padding: 8px 12px;
            margin-bottom: 12px;
            background: #ffcccc;
            border: 2px solid #cc0000;
            color: #660000;
        }
        .btn-save {
            margin-top: 12px;
            background: #ff1493;
            color: white;
            border: none;
            padding: 10px 24px;
            font-family: inherit;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-save:hover { background: #cc0077; }
        a {
            color: #0000cc;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="edit-box">
    <h1>✏️ Edit Post</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST">
        <textarea name="body">{{ post.body }}</textarea>
        <br>
        <input class="btn-save" type="submit" value="Save Changes">
    </form>

    <br>
    <a href="{{ url_for('profile', username=current_user.username) }}">← Back to My Profile</a>
</div>
</body>
</html>
